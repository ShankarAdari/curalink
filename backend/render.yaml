services:
  - type: web
    name: curalink-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OLLAMA_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: mistral
      - key: HF_API_TOKEN
        value: ""
      - key: HF_MODEL
        value: mistralai/Mistral-7B-Instruct-v0.2
